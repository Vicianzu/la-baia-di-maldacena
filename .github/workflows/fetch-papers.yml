name: 📄 Daily arXiv Paper Fetch

on:
  schedule:
    # Ogni giorno alle 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-papers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch arXiv papers
        run: python fetch_papers.py

      - name: Commit and push new papers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers/
          if git diff --cached --quiet; then
            echo "Nessun nuovo paper da committare."
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "📄 Daily arXiv update - ${DATE}"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
